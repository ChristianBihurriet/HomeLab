services:

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    user: "0:0"
    ports:
      - "3001:3000"

    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
